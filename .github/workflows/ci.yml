name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  skill-contract:
    name: Skill contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skills
        run: node scripts/validate-skills.js

  example:
    name: Example project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate example structure
        run: node scripts/validate-example.js