name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  skill-contract:
    name: Skill contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skills
        run: node scripts/validate-skills.js

  agent-system:
    name: Agent system
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate agent system
        run: node scripts/validate-agent-system.js